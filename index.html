
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Викторина: Путешествие во времени</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #333;
            text-align: center;
            border: 8px solid #ffd700;
        }
        .header {
            font-size: 28px;
            color: #764ba2;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .coin-box {
            background: #fffae6;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            color: #d4af37;
            border: 2px solid #ffd700;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .btn {
            background: #4facfe;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 18px;
            margin: 10px 0;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 0 #3884c7;
        }
        .btn:hover {
            background: #00f2fe;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .hidden { display: none; }
        #feedback {
            height: 30px;
            margin-top: 15px;
            font-weight: bold;
        }
        .final-icon { font-size: 80px; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">⏳ Машина Времени</div>
    <div class="coin-box">Монеты: <span id="coins">0</span> 💰</div>

    <div id="quiz-content">
        <div id="q-container">
            <div class="question-text" id="q-text">Загрузка вопроса...</div>
            <div id="options"></div>
        </div>
        <div id="feedback"></div>
    </div>

    <div id="final-screen" class="hidden">
        <div class="final-icon">🏆</div>
        <h2>Блестяще!</h2>
        <p>Ты настоящий историк. Все задания выполнены!</p>
        <button class="btn" onclick="location.reload()" style="background: #27ae60; box-shadow: 0 4px 0 #1e8449;">Играть еще раз</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Кто командовал русской армией в 1812 году?", a: ["М. Кутузов", "Петр I", "А. Суворов"], correct: 0 },
        { q: "В каком году отменили крепостное право?", a: ["1147 г.", "1861 г.", "1945 г."], correct: 1 },
        { q: "Кто был последним императором России?", a: ["Иван Грозный", "Николай II", "Петр III"], correct: 1 },
        { q: "Как называли масштабную стройку заводов в 1930-е?", a: ["Индустриализация", "Олимпиада", "Революция"], correct: 0 },
        { q: "В каком месяце мы празднуем День Победы?", a: ["В июне", "В марте", "В мае"], correct: 2 },
        { q: "Кто первым в мире полетел в космос?", a: ["Нил Армстронг", "Юрий Гагарин", "Белка и Стрелка"], correct: 1 }
    ];

    let currentQ = 0;
    let score = 0;

    function renderQuestion() {
        const data = questions[currentQ];
        document.getElementById('q-text').innerText = data.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        data.a.forEach((ans, index) => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = ans;
            button.onclick = () => check(index);
            optionsDiv.appendChild(button);
        });
    }

    function check(index) {
        const feedback = document.getElementById('feedback');
        if(index === questions[currentQ].correct) {
            score++;
            document.getElementById('coins').innerText = score;
            feedback.innerText = "Правильно! ✨";
            feedback.style.color = "#27ae60";
            setTimeout(next, 1000);
        } else {
            feedback.innerText = "Ой, попробуй другой вариант! 🤔";
            feedback.style.color = "#e74c3c";
        }
    }

    function next() {
        currentQ++;
        document.getElementById('feedback').innerText = "";
        if(currentQ < questions.length) {
            renderQuestion();
        } else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
        }
    }

    renderQuestion();
</script>

</body>
</html>
