<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Супер-подготовка к КР: История</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }
        .game-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 30px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: #333;
            text-align: center;
            position: relative;
        }
        .header { font-size: 24px; color: #1e3c72; margin-bottom: 15px; font-weight: bold; }
        .progress-bar { font-size: 14px; color: #888; margin-bottom: 10px; }
        .coin-box {
            background: #fff9c4;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            color: #f57f17;
            margin-bottom: 20px;
            border: 2px solid #fbc02d;
        }
        .question-text { font-size: 19px; margin-bottom: 20px; font-weight: 600; min-height: 50px; }
        .btn {
            background: #eceff1;
            color: #263238;
            border: 2px solid #cfd8dc;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            margin: 8px 0;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover { background: #e3f2fd; border-color: #2196f3; transform: scale(1.02); }
        .hidden { display: none; }
        #feedback { height: 25px; margin-top: 15px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">🎓 Тренажер к контрольной</div>
    <div class="progress-bar" id="progress">Вопрос 1 из 15</div>
    <div class="coin-box">Счет: <span id="coins">0</span> ⭐</div>

    <div id="quiz-content">
        <div id="q-text" class="question-text">Загрузка...</div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>

    <div id="final-screen" class="hidden">
        <h2 style="color: #2e7d32;">Подготовка завершена!</h2>
        <p id="final-stats"></p>
        <button class="btn" onclick="location.reload()" style="background: #1e3c72; color: white;">Пройти еще раз</button>
    </div>
</div>

<script>
    const allQuestions = [
        // 1812 год
        { q: "В каком году произошла Отечественная война с Наполеоном?", a: ["1812", "1941", "1703"], c: 0 },
        { q: "Как называлось самое крупное сражение войны 1812 года?", a: ["Курская дуга", "Бородинское", "Ледовое побоище"], c: 1 },
        { q: "Кто был главнокомандующим русской армии в 1812 году?", a: ["Суворов", "Кутузов", "Жуков"], c: 1 },
        // 19 век
        { q: "В каком году было отменено крепостное право?", a: ["1861", "1812", "1917"], c: 0 },
        { q: "Какой город стал столицей России в 19 веке?", a: ["Москва", "Санкт-Петербург", "Киев"], c: 1 },
        { q: "Как называли царя Александра II?", a: ["Грозный", "Великий", "Освободитель"], c: 2 },
        // Начало 20 века
        { q: "Кто был последним императором России?", a: ["Николай II", "Петр I", "Александр III"], c: 0 },
        { q: "В каком году в России произошла революция?", a: ["1917", "1812", "1945"], c: 0 },
        // 1920-1930
        { q: "Как называлось новое государство, возникшее в 1922 году?", a: ["Российская Империя", "СССР", "Древняя Русь"], c: 1 },
        { q: "Что такое индустриализация?", a: ["Полет в космос", "Строительство заводов и фабрик", "Посадка лесов"], c: 1 },
        // ВОВ
        { q: "Когда началась Великая Отечественная война?", a: ["22 июня 1941", "1 сентября 1939", "9 мая 1945"], c: 0 },
        { q: "Сколько дней длилась блокада Ленинграда?", a: ["100 дней", "почти 900 дней", "один месяц"], c: 1 },
        { q: "В каком городе состоялся первый Парад Победы?", a: ["В Берлине", "В Москве", "В Париже"], c: 1 },
        // Космос
        { q: "Как назывался корабль Юрия Гагарина?", a: ["Восток-1", "Союз", "Аполлон"], c: 0 },
        { q: "Кто первым из животных успешно вернулся из космоса?", a: ["Стрелка и Бобик", "Белка и Стрелка", "Мухтар"], c: 1 }
    ];

    // Перемешивание вопросов
    const questions = allQuestions.sort(() => Math.random() - 0.5);
    let currentQ = 0;
    let score = 0;

    function render() {
        const data = questions[currentQ];
        document.getElementById('progress').innerText = `Вопрос ${currentQ + 1} из ${questions.length}`;
        document.getElementById('q-text').innerText = data.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        
        data.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = ans;
            b.onclick = () => check(i);
            optDiv.appendChild(b);
        });
    }

    function check(i) {
        const f = document.getElementById('feedback');
        if(i === questions[currentQ].c) {
            score++;
            document.getElementById('coins').innerText = score;
            f.innerText = "Верно! 🌟";
            f.style.color = "#2e7d32";
            setTimeout(next, 800);
        } else {
            f.innerText = "Ошибка! Подумай еще 📝";
            f.style.color = "#d32f2f";
        }
    }

    function next() {
        currentQ++;
        document.getElementById('feedback').innerText = "";
        if(currentQ < questions.length) render();
        else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Твой результат: ${score} из ${questions.length} правильных ответов.`;
        }
    }

    render();
</script>
</body>
</html>
