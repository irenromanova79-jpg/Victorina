
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренажер: Окружающий мир (Плешаков)</title>
    <style>
        :root { --main: #2c3e50; --gold: #f1c40f; --green: #27ae60; --red: #e74c3c; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 650px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 40px; text-align: center; border-bottom: 8px solid var(--main); }
        .q-text { font-size: 24px; color: var(--main); margin: 25px 0; font-weight: bold; min-height: 70px; line-height: 1.3; }
        .btn { background: #fff; border: 2px solid #dee2e6; padding: 18px; border-radius: 15px; font-size: 18px; margin: 10px 0; width: 100%; cursor: pointer; transition: 0.3s; color: #495057; font-weight: 500; }
        .btn:hover { border-color: var(--gold); background: #fffdf5; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn.correct { background: var(--green) !important; color: white; border-color: var(--green); }
        .btn.wrong { background: var(--red) !important; color: white; border-color: var(--red); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
        .score-zone { display: flex; justify-content: space-between; font-weight: bold; color: #adb5bd; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .hint-link { color: #3498db; cursor: pointer; font-size: 14px; margin-top: 15px; display: inline-block; }
        #fin-screen { display: none; padding: 20px; }
        .rank-medal { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="game-zone">
        <div class="score-zone">
            <span>Вопрос <span id="cur">1</span> из 15</span>
            <span style="color:var(--gold)">Очки: <span id="points">0</span> ⭐</span>
        </div>
        <div class="q-text" id="q-txt">Загрузка истории...</div>
        <div id="ans-box"></div>
        <div class="hint-link" onclick="getHint()">Подсказать правильный ответ</div>
    </div>

    <div id="fin-screen">
        <div class="rank-medal" id="medal">🏅</div>
        <h1 id="rank-txt">Результат</h1>
        <p id="stats-txt" style="font-size: 20px; color: #666;"></p>
        <button class="btn" onclick="location.reload()" style="background: var(--main); color:white; border:none; margin-top: 20px;">Пройти ещё раз</button>
    </div>
</div>
