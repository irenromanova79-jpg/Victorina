<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренажер: Великие страницы истории</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
        .question { font-size: 22px; font-weight: 600; margin-bottom: 30px; line-height: 1.4; min-height: 80px; }
        
        .options { display: grid; gap: 12px; }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .btn:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        .btn.correct { background: var(--success) !important; border-color: var(--success); }
        .btn.wrong { background: var(--error) !important; border-color: var(--error); animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        .footer { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .score { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="topic-name">История России</div>
    <div class="question" id="q-text">Загрузка...</div>
    <div class="options" id="options"></div>
    
    <div class="footer">
        <div id="progress">Вопрос 1 из 12</div>
        <div class="score">⭐ <span id="points">0</span></div>
    </div>

    <div id="result" style="display:none">
        <h1 id="result-title">Готово!</h1>
        <p id="result-text"></p>
        <button class="btn" onclick="location.reload()" style="text-align:center; width: 100%; margin-top:20px; background: var(--accent); color: var(--bg); font-weight: bold;">Повторить тренировку</button>
    </div>
</div>

<script>
    const db = [
        {t: "1812 год", q: "В честь победы в Отечественной войне 1812 года в Москве был возведен:", a: ["Исаакиевский собор", "Храм Христа Спасителя", "Казанский собор"], c: 1},
        {t: "1812 год", q: "Кто был назначен главнокомандующим русскими войсками в августе 1812 года?", a: ["А.В. Суворов", "М.И. Кутузов", "П.И. Багратион"], c: 1},
        {t: "История XIX века", q: "В каком году в России было отменено крепостное право?", a: ["1812 г.", "1861 г.", "1881 г."], c: 1},
        {t: "История XIX века", q: "Какое техническое новшество появилось в городах России к концу XIX века?", a: ["Интернет", "Электрическое освещение", "Атомные станции"], c: 1},
        {t: "Начало XX века", q: "Как назывался последний российский император?", a: ["Александр III", "Николай II", "Петр I"], c: 1},
        {t: "Начало XX века", q: "В каком году Россия вступила в Первую мировую войну?", a: ["1905 г.", "1914 г.", "1917 г."], c: 1},
        {t: "СССР", q: "В каком году был официально образован Союз Советских Социалистических Республик (СССР)?", a: ["1917 г.", "1922 г.", "1941 г."], c: 1},
        {t: "1920-е - 1930-е", q: "Что такое 'ликбез', начавшийся в 1920-е годы?", a: ["Строительство заводов", "Ликвидация безграмотности", "Полеты в космос"], c: 1},
        {t: "ВОВ", q: "Какая крепость первой приняла удар немецких войск 22 июня 1941 года?", a: ["Петропавловская", "Брестская", "Смоленская"], c: 1},
        {t: "ВОВ", q: "Сколько дней длилась блокада Ленинграда?", a: ["200 дней", "почти 900 дней", "1000 дней"], c: 1},
        {t: "ВОВ", q: "Какая битва стала началом коренного перелома в войне (зима 1942-1943 гг.)?", a: ["Битва за Москву", "Сталинградская битва", "Курская битва"], c: 1},
        {t: "ВОВ", q: "Кто водрузил Знамя Победы над Рейхстагом в Берлине?", a: ["Г. Жуков и К. Рокоссовский", "М. Егоров и М. Кантария", "И. Кожедуб и А. Покрышкин"], c: 1}
    ];

    let current = 0;
    let score = 0;

    function render() {
        const item = db[current];
        document.getElementById('topic-name').innerText = item.t;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('progress').innerText = `Вопрос ${current + 1} из ${db.length}`;
        
        const box = document.getElementById('options');
        box.innerHTML = '';
        item.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = ans;
            b.onclick = () => check(i, b);
            box.appendChild(b);
        });
    }

    function check(idx, btn) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        
        if(idx === db[current].c) {
            btn.classList.add('correct');
            score++;
            document.getElementById('points').innerText = score;
        } else {
            btn.classList.add('wrong');
            btns[db[current].c].classList.add('correct');
        }
        
        setTimeout(() => {
            current++;
            if(current < db.length) render();
            else showResult();
        }, 1500);
    }

    function showResult() {
        document.getElementById('q-text').style.display = 'none';
        document.getElementById('options').style.display = 'none';
        document.getElementById('topic-name').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        
        const res = document.getElementById('result');
        res.style.display = 'block';
        document.getElementById('result-text').innerText = `Ты набрал ${score} из ${db.length} баллов!`;
        
        if(score === db.length) document.getElementById('result-title').innerText = "Легенда истории! 👑";
        else if(score > 8) document.getElementById('result-title').innerText = "Отличный результат! 🔥";
        else document.getElementById('result-title').innerText = "Нужно еще подучить 📖";
    }

    render();
</script>

</body>
</html>
