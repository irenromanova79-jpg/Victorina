<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История: Великий Квест</title>
    <style>
        :root { --main: #00f2fe; --bg: #0a0e14; --panel: #16212e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { background: var(--panel); width: 95%; max-width: 600px; padding: 30px; border-radius: 30px; border: 2px solid var(--main); box-shadow: 0 0 40px rgba(0, 242, 254, 0.2); text-align: center; }
        
        h1 { color: var(--main); font-size: 28px; margin-bottom: 10px; text-transform: uppercase; }
        .intro-text { opacity: 0.7; margin-bottom: 30px; }
        
        .q-zone { display: none; }
        .topic-tag { color: var(--main); font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        .question { font-size: 22px; font-weight: bold; margin: 20px 0; line-height: 1.4; min-height: 80px; }
        
        .ans-grid { display: grid; gap: 12px; }
        .btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 242, 254, 0.3); 
            padding: 18px; border-radius: 15px; color: white; font-size: 17px; 
            cursor: pointer; transition: 0.2s; text-align: left;
        }
        .btn:hover { background: var(--main); color: black; transform: scale(1.02); }
        .correct { background: #22c55e !important; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; border-color: #ef4444; animation: shake 0.4s; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        
        .progress-bar { height: 8px; background: #1a2a3a; border-radius: 10px; margin-top: 30px; overflow: hidden; }
        .fill { height: 100%; background: var(--main); width: 0%; transition: 0.4s; }
        
        #start-btn { background: var(--main); color: black; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; border: none; }
        #start-btn:hover { box-shadow: 0 0 20px var(--main); }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-start">
        <h1>История России</h1>
        <p class="intro-text">Миссия: Подготовка к контрольной (стр. 77-108)<br>Готов проверить свои знания?</p>
        <button id="start-btn" onclick="startGame()">НАЧАТЬ МИССИЮ</button>
    </div>

    <div id="screen-game" class="q-zone">
        <div class="topic-tag" id="tag">ЭПОХА</div>
        <div class="question" id="q-text">Загрузка...</div>
        <div class="ans-grid" id="ans-box"></div>
        <div class="progress-bar"><div class="fill" id="bar"></div></div>
        <p style="margin-top:15px; font-size:12px; opacity:0.5;">⭐ Очки: <span id="score">0</span> | Вопрос: <span id="num">1</span>/15</p>
    </div>

    <div id="screen-final" style="display:none">
        <h1 id="rank">КОНЕЦ МИССИИ</h1>
        <p id="final-stats" style="font-size:24px"></p>
        <button class="btn" style="width:100%; text-align:center" onclick="location.reload()">ПОВТОРИТЬ ЦИКЛ</button>
    </div>
</div>
