<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История России: 70 шагов к Победе</title>
    <style>
        :root { --main: #00f2fe; --gold: #ffd700; --bg: #0a0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .game-card { background: #16212e; width: 95%; max-width: 650px; padding: 30px; border-radius: 30px; border: 2px solid var(--main); box-shadow: 0 0 50px rgba(0, 242, 254, 0.2); text-align: center; position: relative; }
        .header { display: flex; justify-content: space-between; color: var(--main); font-weight: bold; font-size: 14px; margin-bottom: 15px; }
        .q-text { font-size: 22px; font-weight: bold; margin-bottom: 20px; min-height: 80px; line-height: 1.3; }
        .hint-box { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 10px; border-radius: 10px; font-size: 14px; margin-bottom: 15px; display: none; border: 1px dashed var(--gold); }
        .ans-grid { display: grid; gap: 10px; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid var(--main); padding: 16px; border-radius: 15px; color: white; font-size: 17px; cursor: pointer; transition: 0.2s; text-align: left; position: relative; }
        .btn:hover { background: var(--main); color: black; font-weight: bold; }
        .correct { background: #22c55e !important; color: white; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }
        .praise { color: #00ff88; font-weight: bold; height: 25px; margin-bottom: 10px; font-size: 18px; }
        .progress-container { height: 10px; background: #1a2a3a; border-radius: 20px; margin-top: 25px; overflow: hidden; }
        .bar { height: 100%; background: var(--main); width: 0%; transition: 0.3s; box-shadow: 0 0 15px var(--main); }
        .hint-btn { background: none; border: 1px solid var(--gold); color: var(--gold); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; float: right; }
        .artifacts { margin-top: 15px; display: flex; justify-content: center; gap: 10px; font-size: 24px; min-height: 35px; }
        #start-btn { background: var(--main); color: black; padding: 20px 60px; border-radius: 50px; font-weight: bold; font-size: 24px; cursor: pointer; border: none; box-shadow: 0 0 20px var(--main); }
    </style>
</head>
<body>

<div class="game-card">
    <div id="screen-start">
        <h1 style="color:var(--main); font-size: 32px;">ВЕЛИКИЙ МАРАФОН</h1>
        <p>70 вопросов по истории (стр. 77-108)<br>Собери все артефакты и стань легендой!</p>
        <button id="start-btn" onclick="startApp()">ПОЕХАЛИ!</button>
    </div>

    <div id="screen-game" style="display:none">
        <div class="header">
            <span id="topic">ЭПОХА</span>
            <span>⭐ ОЧКИ: <span id="score">0</span></span>
        </div>
        <div class="praise" id="praise-txt"></div>
        <button class="hint-btn" onclick="showHint()">?</button>
        <div class="q-text" id="q-txt"></div>
        <div class="hint-box" id="hint-box"></div>
        <div class="ans-grid" id="ans-box"></div>
        <div class="artifacts" id="artifacts-box"></div>
        <div class="progress-container"><div class="bar" id="bar"></div></div>
        <p id="counter" style="font-size:12px; opacity:0.5; margin-top:10px"></p>
    </div>

    <div id="screen-final" style="display:none">
        <div id="final-medal" style="font-size: 100px;"></div>
        <h1 id="final-title"></h1>
        <p id="final-stats" style="font-size: 22px;"></p>
        <button class="btn" style="width:100%; text-align:center" onclick="location.reload()">НАЧАТЬ НОВЫЙ МАРАФОН</button>
    </div>
</div>

<script>
    const database = [
        // 1812 ГОД (15 вопросов)

        {t:"1812 ГОД", q:"В каком месяце 1812 года началась война?", a:["Май", "Июнь", "Декабрь"], c:1, h:"Французы перешли Неман в начале лета."},
        {t:"1812 ГОД", q:"Кто командовал русской армией в Бородинской битве?", a:["Суворов", "Кутузов", "Жуков"], c:1, h:"Опытный полководец, ученик Суворова."},
        {t:"1812 ГОД", q:"Главная битва войны 1812 года произошла у села...", a:["Бородино", "Фили", "Полтава"], c:0, h:"Это название знает каждый школьник по стихам Лермонтова."},
        {t:"1812 ГОД", q:"Где прошел совет, на котором решили оставить Москву?", a:["В Кремле", "В деревне Фили", "В штабе армии"], c:1, h:"Совет проходил в крестьянской избе."},
        {t:"1812 ГОД", q:"Почему Кутузов решил сдать Москву французам?", a:["Он испугался", "Чтобы спасти армию и дождаться подкреплений", "Он хотел сжечь город"], c:1, h:"'С потерей Москвы не потеряна Россия...' - говорил он."},
        {t:"1812 ГОД", q:"Что произошло в Москве, когда туда вошел Наполеон?", a:["Его встретили с ключами", "Начались страшные пожары", "Город сдался без боя"], c:1, h:"Огонь уничтожил большую часть деревянного города."},
        {t:"1812 ГОД", q:"Как называли обычных людей, воевавших против врага в тылу?", a:["Партизаны", "Гвардейцы", "Рыцари"], c:0, h:"Они действовали небольшими отрядами в лесах."},
        {t:"1812 ГОД", q:"Какая женщина-партизанка прославилась в 1812 году?", a:["Василиса Кожина", "Екатерина II", "Княгиня Ольга"], c:0, h:"Она была старостихой и водила в бой крестьян."},
        {t:"1812 ГОД", q:"В честь победы над Наполеоном в Москве был построен...", a:["Большой театр", "Храм Христа Спасителя", "Метрополитен"], c:1, h:"Это величественный храм-памятник."},
        {t:"1812 ГОД", q:"Куда бежал Наполеон из России?", a:["В Лондон", "В Париж", "В Берлин"], c:1, h:"Он бросил остатки своей армии и уехал спасать трон."},
        {t:"1812 ГОД", q:"Как назывался первый русский орден, которым награждали героев?", a:["Орден Андрея Первозванного", "Орден Славы", "Медаль 1812 года"], c:0, h:"Это высшая награда империи."},
        {t:"1812 ГОД", q:"Что случилось с 'Великой армией' Наполеона в России?", a:["Она победила", "Она почти полностью погибла", "Она осталась жить в Москве"], c:1, h:"Голод, морозы и партизаны уничтожили захватчиков."},
        {t:"1812 ГОД", q:"Кто написал стихотворение 'Бородино'?", a:["Пушкин", "Лермонтов", "Плешаков"], c:1, h:"'Скажи-ка, дядя, ведь не даром...'"},
        {t:"1812 ГОД", q:"В каком году русские войска вошли в Париж?", a:["1812", "1814", "1945"], c:1, h:"Это был победный заграничный поход."},

        // XIX ВЕК (15 вопросов)
        {t:"XIX ВЕК", q:"Кто такие декабристы?", a:["Дети декабря", "Офицеры, поднявшие восстание против царя", "Зимние рабочие"], c:1, h:"Они вышли на Сенатскую площадь в 1825 году."},

        {t:"XIX ВЕК", q:"Царь-Освободитель — это...", a:["Николай I", "Александр II", "Петр I"], c:1, h:"Он освободил крестьян от власти помещиков."},

        {t:"XIX ВЕК", q:"Транссибирская магистраль соединила...", a:["Москву и Париж", "Москву и Владивосток", "Питер и Киев"], c:1, h:"Это самая длинная железная дорога в мире."},
        {t:"XIX ВЕК", q:"На чем люди ездили по городам до трамваев?", a:["На машинах", "На конке (лошадь тянула вагон)", "На самокатах"], c:1, h:"Название от слова 'конь'."},
        {t:"XIX ВЕК", q:"В каком городе открыли первый памятник Минину и Пожарскому?", a:["Нижний Новгород", "Москва", "Суздаль"], c:1, h:"Он стоит прямо на Красной площади."},
        {t:"XIX ВЕК", q:"Что появилось в городах в конце XIX века?", a:["Телевизоры", "Электрическое освещение и телефон", "Интернет"], c:1, h:"Города стали светлее и удобнее для связи."},
        {t:"XIX ВЕК", q:"Как изменилась жизнь крестьян после 1861 года?", a:["Они стали свободными людьми", "Ничего не изменилось", "Они стали богатыми"], c:0, h:"Теперь их нельзя было продавать или покупать."},
        {t:"XIX ВЕК", q:"Первая железная дорога в России соединила...", a:["Москву и Нижний", "Питер и Царское Село", "Москву и Питер"], c:1, h:"Она была совсем короткой и экспериментальной."},
        {t:"XIX ВЕК", q:"Кто правил Россией почти весь XIX век?", a:["Династия Романовых", "Династия Рюриковичей", "Большевики"], c:0, h:"Это императорская семья."},
        {t:"XIX ВЕК", q:"Как называли крупные заводы, появившиеся в то время?", a:["Мастерские", "Фабрики и мануфактуры", "Офисы"], c:1, h:"Там работали сотни людей и машин."},
        {t:"XIX ВЕК", q:"Что такое Манифест?", a:["Письмо другу", "Торжественное обращение царя к народу", "Учебник"], c:1, h:"Именно Манифестом отменили крепостное право."},
        {t:"XIX ВЕК", q:"Какое техническое чудо помогало передавать сообщения буквами?", a:["Телефон", "Телеграф", "Радио"], c:1, h:"Сообщения передавались по проводам с помощью азбуки Морзе."},
        {t:"XIX ВЕК", q:"В каком стиле строились многие здания XIX века?", a:["Хайтек", "Классицизм", "Древнерусский"], c:1, h:"С колоннами и строгими формами."},

        // XX ВЕК (Революция и СССР - 15 вопросов)
        {t:"XX ВЕК", q:"В каком году началась Первая мировая война?", a:["1905", "1914", "1941"], c:1, h:"Это было за три года до революции."},
        {t:"XX ВЕК", q:"Кто был последним русским царем?", a:["Александр III", "Николай II", "Алексей"], c:1, h:"Он отрекся от престола в 1917 году."},
        {t:"XX ВЕК", q:"В каком году произошла Революция в России?", a:["1914", "1917", "1922"], c:1, h:"События произошли в феврале и октябре этого года."},
        {t:"XX ВЕК", q:"Какая партия пришла к власти в октябре 1917?", a:["Большевики", "Дворяне", "Казаки"], c:0, h:"Их лидером был Владимир Ленин."},

        {t:"XX ВЕК", q:"Кто стал лидером страны после Ленина?", a:["Жуков", "Сталин", "Хрущев"], c:1, h:"Он руководил страной во время индустриализации и ВОВ."},

        {t:"XX ВЕК", q:"Как назывались коллективные хозяйства в деревнях?", a:["Колхозы", "Заводы", "Мастерские"], c:0, h:"Сокращение от 'коллективное хозяйство'."},

        // ВОВ (25 вопросов - финал)
        {t:"ВОВ", q:"Дата начала Великой Отечественной войны?", a:["1 сентября 1939", "22 июня 1941", "9 мая 1945"], c:1, h:"Летнее воскресное утро, 4 часа утра."},
        {t:"ВОВ", q:"Как назывался план нападения Германии на СССР?", a:["Барбаросса", "Тайфун", "Ост"], c:0, h:"В честь средневекового императора Фридриха."},
        {t:"ВОВ", q:"Какая крепость героически сражалась первой?", a:["Брестская", "Киевская", "Московская"], c:0, h:"Она находится на самой границе в Белоруссии."},

        {t:"ВОВ", q:"Когда состоялся первый Парад Победы?", a:["9 мая 1945", "24 июня 1945", "1946"], c:1, h:"Его принимали на белом коне на Красной площади."},

        {t:"ВОВ", q:"Как называли детей, воевавших вместе со взрослыми?", a:["Сыны полка", "Октябрята", "Бойскауты"], c:0, h:"Многие из них стали героями."},

        {t:"ВОВ", q:"В каком году закончилась Вторая мировая война?", a:["9 мая 1945", "2 сентября 1945", "1946"], c:1, h:"После победы над Японией."},
        {t:"ВОВ", q:"Что означают слова 'Никто не забыт, ничто не забыто'?", a:["Правило в школе", "Память о героях войны", "Название книги"], c:1, h:"Эти слова написала поэтесса Ольга Берггольц."},
        {t:"ВОВ", q:"Зачем заклеивали окна бумагой крест-накрест?", a:["Для красоты", "Чтобы стекла не вылетали от взрывов", "Для тепла"], c:1, h:"Это была мера защиты при бомбежках."},
        {t:"ВОВ", q:"Как назывался план Гитлера по захвату Москвы?", a:["Тайфун", "Цитадель", "Багратион"], c:0, h:"Как мощный вихрь."},
        {t:"ВОВ", q:"Какой орден давали за исключительное мужество солдатам?", a:["Орден Славы", "Орден Улыбки", "Медаль за труд"], c:0, h:"У него три степени и оранжево-черная лента."}

    const praises = ["Молодец!", "Так держать!", "Блестяще!", "Верно!", "Ты гений!", "Потрясающе!", "В точку!", "Горжусь тобой!"];
    const artifacts = ["📜", "⚔️", "🏆", "🎖️", "👑", "🌟", "🔥"];
    
    let current = 0, score = 0;

    function startApp() {
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
        update();
    }

    function update() {
        const item = database[current];
        document.getElementById('topic').innerText = item.t;
        document.getElementById('q-txt').innerText = item.q;
        document.getElementById('counter').innerText = `Вопрос ${current + 1} из ${database.length}`;
        document.getElementById('bar').style.width = (current / database.length) * 100 + '%';
        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('praise-txt').innerText = '';
        
        const box = document.getElementById('ans-box');
        box.innerHTML = '';
        item.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = txt;
            b.onclick = () => check(i, b);
            box.appendChild(b);
        });
        
        // Артефакты за каждые 10 очков
        const artCount = Math.floor(score / 10);
        let artHtml = '';
        for(let j=0; j<artCount; j++) artHtml += artifacts[j % artifacts.length] + ' ';
        document.getElementById('artifacts-box').innerHTML = artHtml;
    }

    function showHint() {
        const hb = document.getElementById('hint-box');
        hb.innerText = database[current].h;
        hb.style.display = 'block';
    }

    function check(idx, btn) {
        const correct = database[current].c;
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(idx === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('praise-txt').innerText = praises[Math.floor(Math.random()*praises.length)];
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
            document.getElementById('praise-txt').innerText = 'Ничего, в следующий раз получится!';
            document.getElementById('praise-txt').style.color = '#ff4d4d';
        }

        setTimeout(() => {
            current++;
            document.getElementById('praise-txt').style.color = '#00ff88';
            if(current < database.length) update();
            else finish();
        }, 1200);
    }

    function finish() {
        document.getElementById('screen-game').style.display = 'none';
        const fs = document.getElementById('screen-final');
        fs.style.display = 'block';
        
        let m = "🥉", t = "Ученик-Летописец";
        if(score >= 65) { m = "💎", t = "Легендарный Историк"; }
        else if(score >= 50) { m = "🥇", t = "Маршал Знаний"; }
        else if(score >= 35) { m = "🥈", t = "Знаток Эпох"; }

        document.getElementById('final-medal').innerText = m;
        document.getElementById('final-title').innerText = t;
        document.getElementById('final-stats').innerText = `Твой рекорд: ${score} из ${database.length}`;
    }
</script>
</body>
</html>
