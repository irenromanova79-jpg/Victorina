<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История России: Великий Тренажер</title>
    <style>
        :root {
            --primary: #f59e0b; --bg: #0f172a; --card: #1e293b;
            --text: #f8fafc; --success: #10b981; --error: #ef4444;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }
        .game-wrap {
            width: 100%; max-width: 700px; padding: 20px;
            animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .main-card {
            background: var(--card); border-radius: 30px; padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
        }
        .main-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .badge { background: rgba(245, 158, 11, 0.15); color: var(--primary); padding: 6px 16px; border-radius: 50px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        
        .q-text { font-size: 24px; font-weight: 700; margin-bottom: 30px; line-height: 1.4; min-height: 100px; }
        
        .ans-grid { display: grid; gap: 15px; }
        .ans-btn {
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 18px; color: var(--text); font-size: 18px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left; position: relative;
        }
        .ans-btn:hover { background: rgba(255, 255, 255, 0.07); border-color: var(--primary); transform: translateX(10px); }
        .ans-btn.correct { background: var(--success); border-color: var(--success); transform: scale(1.02); }
        .ans-btn.wrong { background: var(--error); border-color: var(--error); animation: shake 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }

        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 40px; }
        .progress-bar { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.5s ease; box-shadow: 0 0 15px var(--primary); }

        #final { display: none; text-align: center; }
        .stat-circle { font-size: 80px; margin-bottom: 20px; }
        .restart-btn { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="game-wrap">
    <div class="main-card" id="quiz-card">
        <div id="game-view">
