<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История: Уровень ЭКСПЕРТ</title>
    <style>
        :root { --neon: #00f2fe; --pink: #ff00de; --bg: #06090f; }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: linear-gradient(to bottom, #06090f, #1a2a3a);
        }
        .container {
            width: 90%; max-width: 700px; background: rgba(255,255,255,0.03);
            border-radius: 40px; padding: 40px; border: 1px solid rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(20px); box-shadow: 0 0 60px rgba(0, 242, 254, 0.1);
        }
        .header { display: flex; justify-content: space-between; font-weight: bold; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .q-card { font-size: 26px; font-weight: 800; margin-bottom: 30px; line-height: 1.2; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .hint { color: #8899a6; font-size: 14px; margin-bottom: 20px; font-style: italic; }
        .grid { display: grid; gap: 15px; }
        .btn {
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px; color: white; font-size: 18px;
            cursor: pointer; transition: 0.2s; text-align: left;
        }
        .btn:hover { background: rgba(0, 242, 254, 0.15); border-color: var(--neon); transform: scale(1.02); }
        .correct { background: #00ff88 !important; color: #000; font-weight: bold; }
        .wrong { background: #ff4d4d !important; animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
        .progress-bar { width: 100%; height: 10px; background: #111; border-radius: 20px; margin-top: 40px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; transition: 0.4s; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

<div class="container" id="box">
    <div id="game">
        <div class="header">
            <span id="tag">ЭПОХА</span>
            <span>⭐ <span id="pts">0</span></span>
        </div>
        <div class="q-card" id="q-txt">Загрузка миссии...</div>
        <div class="hint" id="hint-txt"></div>
        <div class="grid" id="ans"></div>
        <div class="progress-bar"><div class="bar-fill" id="bar"></div></div>
    </div>

    <div id="result" style="display:none; text-align:center;">
        <h1 style="font-size: 50px; color: var(--neon);">ГОТОВО!</h1>
        <p id="final-score" style="font-size: 24px;"></p>
        <button class="btn" style="width:100%; text-align:center;" onclick="location.reload()">ПЕРЕЗАГРУЗКА</button>
    </div>
</div>
